services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/data.db
      PYTHON_BIN: /opt/venv/bin/python
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
