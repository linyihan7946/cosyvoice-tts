services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cosyvoice_root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cosyvoice_tts}
      MYSQL_USER: ${MYSQL_USER:-cosyvoice}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cosyvoice_password_change_me}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cosyvoice_tts}
      MYSQL_USER: ${MYSQL_USER:-cosyvoice}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cosyvoice_password_change_me}
      PYTHON_BIN: /opt/venv/bin/python
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
